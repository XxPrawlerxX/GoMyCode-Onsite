<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - OutRay</title>
    <link rel="shortcut icon" href="outray_logo2.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="outray_logo.png" alt="outray_logo" />
            <h1>OutRay</h1>
        </div>
        
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign into your account to continue</p>
        <button class="btn">
            <i class="fa-brands fa-github"></i>
            Continue with GitHub
        </button>
        <button class="btn">
            <i class="fa-brands fa-google"></i>
            Continue with Google
        </button>
        <p class="terms">
            By continuing, you agree to OutRay's Terms of Service and Privacy Policy
        </p>
    </div>
</body>
</html>
