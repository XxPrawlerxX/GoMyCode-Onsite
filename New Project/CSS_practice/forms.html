<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Practice</title>
</head>
<body>
    <div style="width: 350px; height: 600px;border-radius: 20px; border: none; background-color: white; display: flex; flex-direction: column; box-shadow: 5px 5px 10px rgba(0,0,0,0.3);">
        <div style="height: 60px;background-color: black; width: 100%; border-radius: 20px 20px 0px 0px;">
            <div style="display: flex;width: 100%; align-items: center;justify-content: space-between;margin: 20px 0px;">
                <div style="width: 50%;margin-left: 20px;"><hr style="color: gray;border-color: gray;height: 2px; background-color: gray;width: 80%;"></div>
                <div style="width: auto;margin-right: 20px;display: flex; align-items: center;">
                    <img src="icons8-close-30.png" alt="" style="width: 20px;color: gray;">
                </div>
            </div>
        </div>
        <div style="height: 540px; margin: 20px 20px;">
            <form style="height: 100%;">
                <div style="display: flex; flex-direction: column; margin-top: 10px;">
                    <label for="" style="font-size: 16px; font-weight: bold; font-family: sans-serif ;">Name:</label>
                    <input type="text" name="" id="" style=" height: 36px;background-color: #D3D3D3;border: none; border-radius: 5px;">
                </div>
                <div style="display: flex; flex-direction: column; margin-top: 10px;">
                    <label for="" style="font-size: 16px; font-weight: bold; font-family: sans-serif ;">Email:</label>
                    <input type="email" name="" id="" style="height: 36px;background-color: #D3D3D3;border: none; border-radius: 5px;">
                </div>
                <div style="display: flex; flex-direction: column; margin-top: 10px;">
                    <label for="" style="font-size: 16px; font-weight: bold; font-family: sans-serif ;">Phone:</label>
                    <input type="tel" name="" id="" style="height: 36px;background-color: #D3D3D3;border: none; border-radius: 5px;">
                </div>
                <div style="display: flex; flex-direction: column; margin-top: 10px;">
                    <label for="" style="font-size: 16px; font-weight: bold; font-family: sans-serif ;">Address:</label>
                    <input type="text" name="" id="" style="height: 36px;background-color: #D3D3D3;border: none; border-radius: 5px;">
                </div>
                <div style="display: flex; width: 100%; margin-top: 10px;gap: 2px;">
                    <div style="display: flex; flex-direction: column; width: 50%;">
                        <label for="" style="font-size: 16px; font-weight: bold; font-family: sans-serif ;">Country</label>
                        <select name="" id="" style="height: 36px;background-color: #D3D3D3;border: none; border-radius: 5px;"></select>
                    </div>
                    <div style="display: flex; flex-direction: column;width: 50%;">
                        <label for="" style="font-size: 16px; font-weight: bold; font-family: sans-serif ;">Province/State</label>
                        <select name="" id="" style="height: 36px;background-color: #D3D3D3; border: none; border-radius: 5px;"></select>
                    </div>
                </div>
                <div style="display: flex; flex-direction: column; margin-top: 10px;">
                    <label for="" style="font-size: 16px; font-weight: bold; font-family: sans-serif ;">Postal/Zipcode</label>
                    <input type="number" name="" id="" style="height: 36px;background-color: #D3D3D3;border: none; border-radius: 5px;">
                </div>
                <button type="submit" style="width: 100%; margin-top: 40px; height: 44px; font-family: sans-serif ; font-weight: 900;font-size: 15px;color: white; background-color: blueviolet; border: none; border-radius: 5px;">Submit</button>
            </form>
        </div>
    </div>
</body>
</html>
